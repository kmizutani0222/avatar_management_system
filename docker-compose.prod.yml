# Production compose — no source bind mounts, production image targets.
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ams}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ams_password}
      POSTGRES_DB: ${POSTGRES_DB:-avatar_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ams}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ams}:${POSTGRES_PASSWORD:-ams_password}@postgres:5432/${POSTGRES_DB:-avatar_management}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-avatars}
      MINIO_USE_SSL: 'false'
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4000,http://localhost:4001,http://localhost:4002}
      MODEL_DELIVERY: ${MODEL_DELIVERY:-proxy}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4003}
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_APP_ROLE: admin
    depends_on:
      - api
    restart: unless-stopped

  user-web:
    build:
      context: .
      dockerfile: apps/user-web/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4003}
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_APP_ROLE: user
    depends_on:
      - api
    restart: unless-stopped

  operator-web:
    build:
      context: .
      dockerfile: apps/operator-web/Dockerfile
      target: production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4003}
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_APP_ROLE: operator
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '4000:4000'
      - '4001:4001'
      - '4002:4002'
      - '4003:4003'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - admin-web
      - user-web
      - operator-web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
