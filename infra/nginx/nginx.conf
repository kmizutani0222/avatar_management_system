events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:3000;
  }

  upstream admin_web {
    server admin-web:3000;
  }

  upstream user_web {
    server user-web:3000;
  }

  upstream operator_web {
    server operator-web:3000;
  }

  # Admin — http://localhost:4000
  server {
    listen 4000;
    server_name _;

    location / {
      proxy_pass http://admin_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # User — http://localhost:4001
  server {
    listen 4001;
    server_name _;

    location / {
      proxy_pass http://user_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # Operator — http://localhost:4002
  server {
    listen 4002;
    server_name _;

    location / {
      proxy_pass http://operator_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # API — http://localhost:4003
  server {
    listen 4003;
    server_name _;

    client_max_body_size 85m;

    location / {
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
