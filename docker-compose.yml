services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ams}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ams_password}
      POSTGRES_DB: ${POSTGRES_DB:-avatar_management}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ams}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9100:9000'
      - '9101:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '4003:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ams}:${POSTGRES_PASSWORD:-ams_password}@postgres:5432/${POSTGRES_DB:-avatar_management}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-avatars}
      MINIO_USE_SSL: 'false'
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    ports:
      - '4000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4003
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_APP_ROLE: admin
    depends_on:
      - api
    volumes:
      - ./apps/admin-web:/app/apps/admin-web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/admin-web/node_modules
      - /app/apps/admin-web/.next

  user-web:
    build:
      context: .
      dockerfile: apps/user-web/Dockerfile
    ports:
      - '4001:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4003
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_APP_ROLE: user
    depends_on:
      - api
    volumes:
      - ./apps/user-web:/app/apps/user-web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/user-web/node_modules
      - /app/apps/user-web/.next

  operator-web:
    build:
      context: .
      dockerfile: apps/operator-web/Dockerfile
    ports:
      - '4002:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4003
      API_INTERNAL_URL: http://api:3000
      NEXT_PUBLIC_APP_ROLE: operator
    depends_on:
      - api
    volumes:
      - ./apps/operator-web:/app/apps/operator-web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/operator-web/node_modules
      - /app/apps/operator-web/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:
