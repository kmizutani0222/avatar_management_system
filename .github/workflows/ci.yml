name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        run: |
          pnpm --filter @ams/shared-types build
          pnpm --filter @ams/sdk-web build
          pnpm --filter @ams/sdk-three build
          pnpm --filter @ams/web-auth build
          pnpm --filter @ams/parts-baker build
          pnpm --filter @ams/avatar-viewer build
          pnpm --filter @ams/api build
          pnpm --filter @ams/admin-web build
          pnpm --filter @ams/user-web build
          pnpm --filter @ams/operator-web build
